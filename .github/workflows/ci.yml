name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Offline safety checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate operating-layer safety contracts
        run: python scripts/validate_operating_layer.py

      - name: Compile Python sources
        run: python -m compileall agency_bigquery scripts tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
